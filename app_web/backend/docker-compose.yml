    ports:
      - "8004:8004"
    env_file: [.env]
    networks: [backend]
    volumes:
      - ../../mlops:/workspace/mlops
      - ../public/data:/workspace/Data5G:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
