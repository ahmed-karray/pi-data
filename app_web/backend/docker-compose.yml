    volumes:
      - ../../mlops:/workspace/mlops
      - ../public/data:/workspace/Data5G:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitoring_service:
