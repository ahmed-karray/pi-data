      - "8002:8002"
    env_file: [.env]
    networks: [backend]
    volumes:
      - ../../mlops:/workspace/mlops:ro
      - ../public/data:/workspace/Data5G:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ml_training_service:
