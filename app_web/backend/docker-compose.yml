services:
  gateway:
    build:
      context: ..
      dockerfile: backend/Dockerfile.backend
    command: uvicorn app_web.backend.gateway.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8010:8000"
    env_file:
      - .env
    depends_on:
      - auth_service
      - detection_service
      - ml_training_service
      - monitoring_service
      - dashboard_service
      - admin_service
    networks:
      - gateway
      - backend
    volumes:
      - ../../mlops:/workspace/mlops:ro
      - ../public/data:/workspace/Data5G:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth_service:
    build:
      context: ..
      dockerfile: backend/Dockerfile.backend
    command: uvicorn app_web.backend.auth_service.app:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: [.env]
    networks: [backend]
    volumes:
      - ../../mlops:/workspace/mlops:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  detection_service:
    build:
      context: ..
      dockerfile: backend/Dockerfile.backend
    command: uvicorn app_web.backend.detection_service.app:app --host 0.0.0.0 --port 8002
