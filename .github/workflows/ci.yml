name: MLOps CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  code-quality-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_web/backend/requirements.txt
          pip install -r MLOPS/requirements.txt
          pip install bandit black flake8 safety

      - name: Black check
        run: black --check app_web/backend MLOPS

      - name: Flake8
        run: flake8 app_web/backend MLOPS --max-line-length=100

      - name: Bandit
        run: bandit -r app_web/backend MLOPS -ll -f txt -o bandit-report.txt

      - name: Safety
        run: |
          safety check -r app_web/backend/requirements.txt \
            --ignore SFTY-20260316-53222 \
            --ignore SFTY-20260221-10798 \
            --ignore SFTY-20260221-01819 \
            --ignore 71693 \
            --ignore 83076 \
            --ignore 83170 \
            --ignore 89825 \
            --ignore SFTY-20260330-90105 \
            --ignore 82294 \
            --ignore SFTY-20260327-54769 \
            --ignore 71579 \
            --ignore SFTY-20260330-50777 \
            --ignore 71578 \
            --ignore 71577 \
            --ignore 71691 \
            --ignore 85679 \
            --ignore 71587 \
            --ignore 77891 \
            --ignore 71584 \
            --ignore SFTY-20260112-09087 \
            --ignore 71692 \
            --ignore SFTY-20251029-46514

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Code Quality & Security"
            echo ""
            echo "- Black format check"
            echo "- Flake8 linting"
            echo "- Bandit security scan"
            echo "- Safety dependency scan"
          } >> "$GITHUB_STEP_SUMMARY"

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [code-quality-security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_web/backend/requirements.txt
          pip install -r MLOPS/requirements.txt
          pip install pytest pytest-json-report

      - name: Run pytest
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE"
          pytest MLOPS/test_pipeline.py MLOPS/test_api.py MLOPS/test_attack_classifier.py app_web/backend/tests -v --tb=short --json-report --json-report-file=test-report.json

      - name: Upload raw test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json

      - name: Job summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("test-report.json")
          if not report_path.exists():
              summary = [
                  "## Run Tests summary",
                  "",
                  "No `test-report.json` file was produced.",
              ]
          else:
              report = json.loads(report_path.read_text(encoding="utf-8"))
              summary = [
                  "## Run Tests summary",
                  "",
                  "### Test Results",
                  "",
                  f"- Total tests: {report.get('summary', {}).get('total', 0)}",
                  f"- Passed: {report.get('summary', {}).get('passed', 0)}",
                  f"- Failed: {report.get('summary', {}).get('failed', 0)}",
                  f"- Skipped: {report.get('summary', {}).get('skipped', 0)}",
              ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("\n".join(summary) + "\n")
          PY

  train-ml-models:
    name: Train ML Models
    runs-on: ubuntu-latest
    needs: [run-tests]
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow_ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_web/backend/requirements.txt
          pip install -r MLOPS/requirements.txt

      - name: Run training pipeline
        run: python MLOPS/main.py --dataset eMBB --train

      - name: Assert model artifact exists
        run: test -f MLOPS/lightgbm_eMBB.joblib

      - name: Assert MLflow tracking database exists
        run: |
          test -s mlflow_ci.db

      - name: Upload trained model
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embb-model
          path: MLOPS/lightgbm_eMBB.joblib

      - name: Upload MLflow database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-ci-db
          path: mlflow_ci.db

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Train ML Models summary"
            echo ""
            echo "- Dataset: eMBB"
            echo "- Output: \`MLOPS/lightgbm_eMBB.joblib\`"
            echo "- Tracking: local CI MLflow SQLite database"
          } >> "$GITHUB_STEP_SUMMARY"

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [train-ml-models]
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub secrets
        id: docker-secrets
        run: |
          if [ -n "${DOCKERHUB_USER}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        if: steps.docker-secrets.outputs.available == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        if: steps.docker-secrets.outputs.available == 'true'
        run: |
          docker build -t $DOCKERHUB_USER/6g-ids-backend:${{ github.sha }} -f app_web/backend/Dockerfile.backend app_web
          docker push $DOCKERHUB_USER/6g-ids-backend:${{ github.sha }}

      - name: Build and push analyst UI
        if: steps.docker-secrets.outputs.available == 'true'
        run: |
          docker build -t $DOCKERHUB_USER/6g-ids-analyst:${{ github.sha }} -f app_web/frontend/analyst/Dockerfile app_web/frontend/analyst
          docker push $DOCKERHUB_USER/6g-ids-analyst:${{ github.sha }}

      - name: Build and push scientist UI
        if: steps.docker-secrets.outputs.available == 'true'
        run: |
          docker build -t $DOCKERHUB_USER/6g-ids-scientist:${{ github.sha }} -f app_web/frontend/scientist/Dockerfile app_web/frontend/scientist
          docker push $DOCKERHUB_USER/6g-ids-scientist:${{ github.sha }}

      - name: Build and push admin UI
        if: steps.docker-secrets.outputs.available == 'true'
        run: |
          docker build -t $DOCKERHUB_USER/6g-ids-admin:${{ github.sha }} -f app_web/frontend/admin/Dockerfile app_web/frontend/admin
          docker push $DOCKERHUB_USER/6g-ids-admin:${{ github.sha }}

      - name: Skip Docker build when secrets are missing
        if: steps.docker-secrets.outputs.available != 'true'
        run: |
          {
            echo "Docker Hub secrets are not configured."
            echo "Skipping image build/push for this CI run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Build Docker Images summary"
            echo ""
            echo "- Backend image built from \`app_web/backend/Dockerfile.backend\`"
            echo "- Frontend images built for analyst, scientist, and admin apps"
            echo "- Images are pushed only when Docker Hub secrets are configured"
          } >> "$GITHUB_STEP_SUMMARY"

  test-results:
    name: Test Results
    runs-on: ubuntu-latest
    needs: [run-tests]
    if: always()
    steps:
      - name: Publish test status
        run: |
          {
            echo "## Test Results"
            echo ""
            echo "- Run Tests job result: `${{ needs.run-tests.result }}`"
            echo "- The detailed JSON report is uploaded as the \`test-report\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-status:
    name: Notify Status
    runs-on: ubuntu-latest
    needs:
      [
        code-quality-security,
        run-tests,
        train-ml-models,
        build-docker-images,
        test-results,
      ]
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          {
            echo "## MLOps CI/CD Pipeline status"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Code Quality & Security | ${{ needs.code-quality-security.result }} |"
            echo "| Run Tests | ${{ needs.run-tests.result }} |"
            echo "| Train ML Models | ${{ needs.train-ml-models.result }} |"
            echo "| Build Docker Images | ${{ needs.build-docker-images.result }} |"
            echo "| Test Results | ${{ needs.test-results.result }} |"
            echo ""
            echo "Check the workflow graph above for the stage-by-stage visual pipeline."
          } >> "$GITHUB_STEP_SUMMARY"
